    <main>

                <h2 class="section-title">КОНТАКТНАЯ ИНФОРМАЦИЯ</h2>
                
                <div class="contact-list">
                    <div class="contact-item">
                        <div class="icon-box">📞</div>
                        <div class="text">
                            <span>Телефон</span>
                            <strong>7 911 696 05 86</strong>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="icon-box">✉️</div>
                        <div class="text">
                            <span>Электронная почта</span>
                            <strong>lopukhov_gleb@mail.ru</strong>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="icon-box">📍</div>
                        <div class="text">
                            <span>Расположение</span>
                            <strong>Санкт-Петербург, Россия</strong>
                        </div>
                    </div>
                </div>

                <h2 class="section-title">СОЦИАЛЬНЫЕ СЕТИ</h2>

                    <a href="#" class="social-item"><span>Bē</span></a>

            <section class="form-side">
                <div class="form-card">
                    <h3 class="form-title">ОТПРАВИТЬ СООБЩЕНИЕ</h3>
                    <form id="contact-form">
                        <div class="input-group">
                            <label>Как я могу к вам обращаться</label>
                            <input type="text" id="name" placeholder="Леонид Каневский" required>
                        </div>
                        <div class="input-group">
                            <label>Ваша электронная почта</label>
                            <input type="email" id="email" placeholder="Leonid@gmail.com" required>
                        </div>
                        <div class="input-group">
                            <label>Сообщение</label>
                            <textarea id="message" placeholder="Введите текст..." required></textarea>
                        </div>
                        
                        <div id="form-status" class="form-status"></div>

                        <button type="submit" id="submit-btn" class="submit-btn">ОТПРАВИТЬ</button>
                    </form>
                </div>
            </section>
